plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.mango.ytstream"
    compileSdk 36

    defaultConfig {
        applicationId "com.mango.ytstream"
        minSdk 29
        targetSdk 36
        versionCode 3
        versionName "1.2.0"
    }

    signingConfigs {
        release {
            storeFile file("keystore/ytstream.jks")
            storePassword "ytstream2026"
            keyAlias "ytstream"
            keyPassword "ytstream2026"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.3.0"
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "com.github.pedroSG94.RootEncoder:library:2.7.3"
    implementation 'com.google.mlkit:face-detection:16.1.7'
    implementation 'com.google.android.gms:play-services-tasks:18.1.0'
}
