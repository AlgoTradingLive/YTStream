name: ytstream
description: YouTube Internal Audio Streamer for Mango

publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  image_picker: ^1.0.7
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/Fonts/Bangers-Regular.ttf
    - assets/Fonts/Roboto-Bold.ttf
    - assets/Fonts/Roboto_Condensed-Black.ttf
